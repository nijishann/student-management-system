<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OurUniversity | Secure Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 50%, #60a5fa 100%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .floating {
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .input-focus:focus {
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="absolute top-10 left-10 w-32 h-32 bg-blue-400 rounded-full mix-blend-multiply filter blur-xl opacity-70 animate-blob"></div>
    <div class="absolute bottom-10 right-10 w-32 h-32 bg-purple-400 rounded-full mix-blend-multiply filter blur-xl opacity-70 animate-blob animation-delay-2000"></div>

    <div class="glass-card w-full max-w-[450px] rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.2)] overflow-hidden relative">
        
        <div class="pt-10 pb-6 px-10 text-center">
            <div class="floating inline-block mb-4">
                <div class="bg-gradient-to-tr from-blue-600 to-blue-400 w-20 h-20 rounded-2xl flex items-center justify-center shadow-lg transform rotate-12">
                    <i class="fas fa-user-graduate text-white text-3xl -rotate-12"></i>
                </div>
            </div>
            <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">Welcome Back!</h1>
            <p class="text-gray-500 mt-2 text-sm font-medium">Please enter your details to access  Admin</p>
        </div>

        {% if messages %}
            <div class="px-10">
                {% for message in messages %}
                <div class="flex items-center p-4 mb-4 text-red-800 rounded-2xl bg-red-50 border border-red-100" role="alert">
                    <i class="fas fa-circle-exclamation mr-3"></i>
                    <div class="text-xs font-semibold">{{ message }}</div>
                </div>
                {% endfor %}
            </div>
        {% endif %}

        <form method="POST" action="{% url 'login' %}" class="px-10 pb-10 space-y-5">
            {% csrf_token %}
            
            <div class="space-y-2">
                <label class="text-sm font-bold text-gray-700 ml-1">Username</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fas fa-at text-gray-400 group-focus-within:text-blue-500 transition-colors"></i>
                    </div>
                    <input type="text" name="username" required 
                        class="block w-full pl-11 pr-4 py-3.5 bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-2xl input-focus focus:border-blue-500 focus:bg-white transition-all outline-none" 
                        placeholder="Enter username">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-sm font-bold text-gray-700 ml-1">Password</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fas fa-key text-gray-400 group-focus-within:text-blue-500 transition-colors"></i>
                    </div>
                    <input type="password" name="password" required 
                        class="block w-full pl-11 pr-4 py-3.5 bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-2xl input-focus focus:border-blue-500 focus:bg-white transition-all outline-none" 
                        placeholder="••••••••">
                </div>
            </div>

            <div class="flex items-center justify-between px-1">
                <div class="flex items-center">
                    <input type="checkbox" class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-blue-500 cursor-pointer">
                    <label class="ml-2 text-xs font-semibold text-gray-600 cursor-pointer">Remember me</label>
                </div>
                <a href="#" class="text-xs font-bold text-blue-600 hover:text-blue-800 transition">Forgot Password?</a>
            </div>

            <button type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-200 transition-all active:scale-[0.98] flex items-center justify-center space-x-2 overflow-hidden relative group">
                <span class="relative z-10">Sign In to Dashboard</span>
                <i class="fas fa-chevron-right text-xs relative z-10 group-hover:translate-x-1 transition-transform"></i>
                <div class="absolute inset-0 bg-gradient-to-r from-blue-700 to-blue-500 opacity-0 group-hover:opacity-100 transition-opacity"></div>
            </button>
            <p class="text-center mt-3">
                 Don't have an account? 
                <a href="{% url 'register_page' %}">Register here</a>
            </p>
        </form>

        
    </div>

</body>
</html>
