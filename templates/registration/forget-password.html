{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Forget Password - SIMS</title>
   <script src="https://cdn.tailwindcss.com"></script>
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
   <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
      body { font-family: 'Poppins', sans-serif; }
      .step { display: none; }
      .step.active { display: block; }
      .card-animate { animation: slideUp 0.5s ease-out; }
      @keyframes slideUp {
         from { transform: translateY(20px); opacity: 0; }
         to { transform: translateY(0); opacity: 1; }
      }
   </style>
</head>
<body class="min-h-screen flex items-center justify-center"
      style="background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); padding: 20px;">

<div class="card-animate bg-white rounded-3xl shadow-2xl p-10 w-full max-w-md">

   <!-- Header -->
   <div class="text-center mb-8">
      <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
         <i class="fas fa-lock text-blue-600 text-2xl"></i>
      </div>
      <h2 class="text-2xl font-bold text-gray-800">Forgot Password?</h2>
      <p class="text-gray-400 text-sm mt-1">Reset your password using your email</p>
   </div>

   {% if messages %}
   {% for message in messages %}
   <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl mb-4 text-sm">
      <i class="fas fa-exclamation-circle mr-2"></i>{{ message }}
   </div>
   {% endfor %}
   {% endif %}

   <!-- Step Indicator -->
   <div class="flex items-center justify-center mb-8">
      <div class="flex items-center space-x-2">
         <div id="step1Dot" class="w-8 h-8 rounded-full bg-blue-600 text-white flex items-center justify-center text-sm font-bold">1</div>
         <div class="w-12 h-1 bg-gray-200" id="line1"></div>
         <div id="step2Dot" class="w-8 h-8 rounded-full bg-gray-200 text-gray-500 flex items-center justify-center text-sm font-bold">2</div>
         <div class="w-12 h-1 bg-gray-200" id="line2"></div>
         <div id="step3Dot" class="w-8 h-8 rounded-full bg-gray-200 text-gray-500 flex items-center justify-center text-sm font-bold">3</div>
      </div>
   </div>

   <!-- STEP 1: Email দিন -->
   <div class="step active" id="step1">
      <h5 class="font-semibold text-gray-700 mb-4">
         <i class="fas fa-envelope mr-2 text-blue-500"></i>Step 1: Enter Email
      </h5>
      <div class="mb-4">
         <label class="block text-sm font-medium text-gray-600 mb-2">Registered Email</label>
         <input type="email" id="resetEmail"
            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="Enter your registered email">
         <div id="emailCheckMsg" class="text-sm mt-2 font-medium"></div>
      </div>
      <button id="sendResetOtp"
         class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-all">
         <i class="fas fa-paper-plane mr-2"></i>Send OTP
      </button>
   </div>

   <!-- STEP 2: OTP Verify করুন -->
   <div class="step" id="step2">
      <h5 class="font-semibold text-gray-700 mb-4">
         <i class="fas fa-shield-alt mr-2 text-blue-500"></i>Step 2: Verify OTP
      </h5>
      <div id="otpInfoBox" class="bg-blue-50 rounded-xl p-3 mb-4 text-sm text-blue-700">
         <i class="fas fa-info-circle mr-1"></i>
         <span id="otpSentMsg"></span>
      </div>
      <div class="mb-4">
         <label class="block text-sm font-medium text-gray-600 mb-2">6-Digit OTP</label>
         <input type="text" id="resetOtpInput" maxlength="6"
            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 text-center text-2xl font-bold tracking-widest"
            placeholder="- - - - - -">
         <div id="otpVerifyMsg" class="text-sm mt-2 font-medium"></div>
      </div>
      <button id="verifyResetOtpBtn"
         class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-all mb-3">
         <i class="fas fa-check-circle mr-2"></i>Verify OTP
      </button>
      <button id="resendOtpBtn"
         class="w-full bg-white border-2 border-blue-600 text-blue-600 font-bold py-3 rounded-xl hover:bg-blue-50 transition-all">
         <i class="fas fa-redo mr-2"></i>Resend OTP
      </button>
   </div>

   <!-- STEP 3: নতুন Password দিন -->
   <div class="step" id="step3">
      <h5 class="font-semibold text-gray-700 mb-4">
         <i class="fas fa-key mr-2 text-blue-500"></i>Step 3: Enter New Password
      </h5>
      <form method="POST" action="{% url 'reset_password' %}" id="resetForm">
         {% csrf_token %}
         <div class="mb-4">
            <label class="block text-sm font-medium text-gray-600 mb-2">New Password</label>
            <div class="relative">
               <input type="password" name="new_password" id="newPassword"
                  class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 pr-12"
                  placeholder="Enter new password (minimum 6 characters)">
               <button type="button" onclick="togglePassword('newPassword', 'eye1')"
                  class="absolute right-4 top-3.5 text-gray-400 hover:text-blue-600">
                  <i class="fas fa-eye" id="eye1"></i>
               </button>
            </div>
            <div id="passwordStrength" class="mt-2"></div>
         </div>
         <div class="mb-6">
            <label class="block text-sm font-medium text-gray-600 mb-2">Confirm Password</label>
            <div class="relative">
               <input type="password" name="confirm_password" id="confirmPassword"
                  class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 pr-12"
                  placeholder="Confirm your password">
               <button type="button" onclick="togglePassword('confirmPassword', 'eye2')"
                  class="absolute right-4 top-3.5 text-gray-400 hover:text-blue-600">
                  <i class="fas fa-eye" id="eye2"></i>
               </button>
            </div>
            <div id="passwordMatchMsg" class="text-sm mt-2 font-medium"></div>
         </div>
         <button type="submit"
            class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl transition-all">
            <i class="fas fa-save mr-2"></i>Reset Password
         </button>
      </form>
   </div>

   <!-- Back to Login -->
   <div class="text-center mt-6">
      <a href="{% url 'login' %}" class="text-blue-600 text-sm hover:underline font-medium">
         <i class="fas fa-arrow-left mr-1"></i>Back to Login
      </a>
   </div>

</div>

<script>
   // ========== STEP NAVIGATION ==========
   function goToStep(step) {
      document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
      document.getElementById(`step${step}`).classList.add('active');

      // Step indicator update
      for (let i = 1; i <= 3; i++) {
         const dot = document.getElementById(`step${i}Dot`);
         if (i < step) {
            dot.className = 'w-8 h-8 rounded-full bg-green-500 text-white flex items-center justify-center text-sm font-bold';
            dot.innerHTML = '<i class="fas fa-check text-xs"></i>';
         } else if (i === step) {
            dot.className = 'w-8 h-8 rounded-full bg-blue-600 text-white flex items-center justify-center text-sm font-bold';
            dot.innerHTML = i;
         } else {
            dot.className = 'w-8 h-8 rounded-full bg-gray-200 text-gray-500 flex items-center justify-center text-sm font-bold';
            dot.innerHTML = i;
         }
      }
   }

   // ========== SEND RESET OTP ==========
   document.getElementById('sendResetOtp').addEventListener('click', function () {
      const email = document.getElementById('resetEmail').value.trim();
      const msgEl = document.getElementById('emailCheckMsg');

      if (!email) {
         msgEl.innerHTML = '<span class="text-red-500">❌ Please enter your email!</span>';
         return;
      }

      this.disabled = true;
      this.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Sending...';
      const btn = this;

      fetch(`/student/send-reset-otp/?email=${encodeURIComponent(email)}`)
         .then(res => res.json())
         .then(data => {
            if (data.success) {
               // Go to Step 2
               goToStep(2);
               document.getElementById('otpSentMsg').textContent = data.message;

               // Show Dev OTP
               if (data.dev_otp) {
                  document.getElementById('otpInfoBox').innerHTML = `
                     <i class="fas fa-info-circle mr-1"></i> ${data.message}
                     <div class="mt-2 bg-white rounded-lg p-2 text-center">
                        <span class="text-xs text-gray-500">Demo OTP:</span>
                        <div class="text-2xl font-bold text-blue-800 tracking-widest">${data.dev_otp}</div>
                     </div>`;
               }
            } else {
               msgEl.innerHTML = `<span class="text-red-500">${data.message}</span>`;
               btn.disabled = false;
               btn.innerHTML = '<i class="fas fa-paper-plane mr-2"></i>Send OTP';
            }
         });
   });

   // ========== RESEND OTP ==========
   document.getElementById('resendOtpBtn').addEventListener('click', function () {
      goToStep(1);
      document.getElementById('emailCheckMsg').innerHTML = '';
      document.getElementById('sendResetOtp').disabled = false;
      document.getElementById('sendResetOtp').innerHTML = '<i class="fas fa-paper-plane mr-2"></i>Send OTP';
   });

   // ========== VERIFY RESET OTP ==========
   document.getElementById('verifyResetOtpBtn').addEventListener('click', function () {
      const otp = document.getElementById('resetOtpInput').value.trim();
      const msgEl = document.getElementById('otpVerifyMsg');

      if (!otp) {
         msgEl.innerHTML = '<span class="text-red-500">❌ Please enter the OTP!</span>';
         return;
      }

      fetch(`/student/verify-reset-otp/?otp=${encodeURIComponent(otp)}`)
         .then(res => res.json())
         .then(data => {
            if (data.success) {
               msgEl.innerHTML = `<span class="text-green-600">${data.message}</span>`;
               setTimeout(() => goToStep(3), 1000);
            } else {
               msgEl.innerHTML = `<span class="text-red-500">${data.message}</span>`;
            }
         });
   });

   // ========== PASSWORD STRENGTH ==========
   document.getElementById('newPassword').addEventListener('input', function () {
      const val = this.value;
      const el = document.getElementById('passwordStrength');
      if (!val) { el.innerHTML = ''; return; }

      let strength = 0;
      if (val.length >= 6) strength++;
      if (val.length >= 10) strength++;
      if (/[A-Z]/.test(val)) strength++;
      if (/[0-9]/.test(val)) strength++;
      if (/[^A-Za-z0-9]/.test(val)) strength++;

      const labels = ['', 'Weak', 'Fair', 'Good', 'Strong', 'Very Strong'];
      const colors = ['', 'red', 'orange', 'yellow', 'blue', 'green'];
      const widths = ['', '20%', '40%', '60%', '80%', '100%'];

      el.innerHTML = `
         <div class="flex justify-between text-xs mb-1">
            <span class="text-gray-500">Password Strength:</span>
            <span class="text-${colors[strength]}-600 font-semibold">${labels[strength]}</span>
         </div>
         <div class="w-full bg-gray-200 rounded-full h-1.5">
            <div class="h-1.5 rounded-full bg-${colors[strength]}-500 transition-all" style="width: ${widths[strength]}"></div>
         </div>`;
   });

   // ========== PASSWORD MATCH CHECK ==========
   document.getElementById('confirmPassword').addEventListener('input', function () {
      const pass1 = document.getElementById('newPassword').value;
      const pass2 = this.value;
      const msgEl = document.getElementById('passwordMatchMsg');

      if (!pass2) { msgEl.innerHTML = ''; return; }
      if (pass1 === pass2) {
         msgEl.innerHTML = '<span class="text-green-600">✅ Passwords match!</span>';
      } else {
         msgEl.innerHTML = '<span class="text-red-500">❌ Passwords do not match!</span>';
      }
   });

   // ========== TOGGLE PASSWORD VISIBILITY ==========
   function togglePassword(inputId, iconId) {
      const input = document.getElementById(inputId);
      const icon = document.getElementById(iconId);
      if (input.type === 'password') {
         input.type = 'text';
         icon.className = 'fas fa-eye-slash';
      } else {
         input.type = 'password';
         icon.className = 'fas fa-eye';
      }
   }
</script>
</body>
</html>
