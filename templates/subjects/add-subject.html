{% extends 'Home/base.html' %}
{% load static %}
{% block body %}

<div class="page-wrapper">
   <div class="content container-fluid">
      <div class="page-header">
         <div class="row align-items-center">
            <div class="col">
               <h3 class="page-title">Add Subject</h3>
               <ul class="breadcrumb">
                  <li class="breadcrumb-item"><a href="{% url 'index' %}">Dashboard</a></li>
                  <li class="breadcrumb-item"><a href="{% url 'subject_list' %}">Subjects</a></li>
                  <li class="breadcrumb-item active">Add Subject</li>
               </ul>
            </div>
         </div>
      </div>

      <div class="row">
         <div class="col-sm-12">
            <div class="card">
               <div class="card-body">
                  <form method="POST">
                     {% csrf_token %}
                     <div class="row">
                        <div class="col-12">
                           <h5 class="form-title"><span>Subject Information</span></h5>
                        </div>
                        <div class="col-12 col-sm-6">
                           <div class="form-group">
                              <label>Subject Name <span class="text-danger">*</span></label>
                              <input type="text" class="form-control" name="name" placeholder="e.g. Mathematics, Physics" required>
                           </div>
                        </div>
                        <div class="col-12 col-sm-6">
                           <div class="form-group">
                              <label>Department</label>
                              <select class="form-control" name="department">
                                 <option value="">Select Department</option>
                                 {% for dept in departments %}
                                 <option value="{{ dept.id }}">{{ dept.name }}</option>
                                 {% endfor %}
                              </select>
                           </div>
                        </div>
                        <div class="col-12 col-sm-6">
                           <div class="form-group">
                              <label>Description</label>
                              <textarea class="form-control" name="description" rows="3" placeholder="Short description"></textarea>
                           </div>
                        </div>
                     </div>
                     <div class="row">
                        <div class="col-12">
                           <button type="submit" class="btn btn-primary mr-2">
                              <i class="fas fa-plus mr-1"></i> Add Subject
                           </button>
                           <a href="{% url 'subject_list' %}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                     </div>
                  </form>
               </div>
            </div>
         </div>
      </div>
   </div>
   <footer><p>Copyright &copy; 2026 OurUniversity</p></footer>
</div>
</div>

<script src="{% static 'assets/js/jquery-3.6.0.min.js' %}"></script>
<script src="{% static 'assets/js/popper.min.js' %}"></script>
<script src="{% static 'assets/plugins/bootstrap/js/bootstrap.min.js' %}"></script>
<script src="{% static 'assets/plugins/slimscroll/jquery.slimscroll.min.js' %}"></script>
<script src="{% static 'assets/js/script.js' %}"></script>
</body>
</html>
{% endblock %}
